{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logged Out — RiskWise Planner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="rw-body">

<div class="container-fluid">
  <div class="row min-vh-100 justify-content-center align-items-center p-4">
    <div class="col-lg-5 col-xl-4">
      <section class="rw-panel-card text-center">

        <div class="mb-4">
          <i class="bi bi-box-arrow-right" style="font-size: 2.8rem; color: var(--rw-primary);"></i>
        </div>

        <div class="rw-eyebrow">SESSION COMPLETE</div>
        <h1 class="rw-page-title mb-3" style="font-size: 1.7rem;">You have been logged out</h1>
        <p class="rw-page-subtitle mb-4">
          Your RiskWise session has ended successfully.
        </p>

        <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
          <span class="rw-badge rw-badge--neutral">Secure Sign-Out</span>
          <span class="rw-badge rw-badge--neutral">Session Closed</span>
        </div>

        <div class="d-grid gap-2">
          <a href="{% url 'login' %}" class="btn rw-btn-primary">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In Again
          </a>
          <a href="{% url 'home' %}" class="btn rw-btn-outline">
            <i class="bi bi-house-door me-2"></i>Back to Home
          </a>
        </div>

      </section>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
