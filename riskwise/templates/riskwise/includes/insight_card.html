<div class="rw-feature-card h-100">
  {% if title %}
    <div class="rw-section-heading mb-3">
      <h3 class="rw-section-title mb-1">{{ title }}</h3>
      {% if subtitle %}
        <p class="rw-section-subtitle mb-0">{{ subtitle }}</p>
      {% endif %}
    </div>
  {% endif %}

  <div class="rw-insight-list">
    {% for item in items %}
      <div class="rw-insight-item">
        <div class="rw-insight-dot rw-dot-{{ item.variant|default:'primary' }}"></div>
        <div>
          {% if item.label %}
            <strong>{{ item.label }}</strong><br>
          {% endif %}
          {{ item.text }}
        </div>
      </div>
    {% endfor %}
  </div>
</div>
